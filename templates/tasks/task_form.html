{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Add Task</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
    <div class="container">
        <h2>Add New Task</h2>

        <form method="POST">
            {% csrf_token %}

            <!-- Title -->
            <label>Title</label>
            {{ form.title }}

            <!-- Description -->
            <label>Description</label>
            {{ form.description }}

            <div class="checkbox-row">
                {{ form.completed }}
                <label for="id_completed">Completed</label>
            </div>

            <!-- Assigned User -->
            <label>Assigned to</label>
            {{ form.assigned_to }}

            <!-- Subtask Section -->
            <div class="subtask-section">
                <h4>Subtask Details</h4>

                <label>Subtask Title</label>
                <input type="text" name="subtask_title" placeholder="Enter subtask title">

                <label>Subtask Description</label>
                <textarea name="subtask_description" placeholder="Enter subtask description"></textarea>
            </div>

            <button type="submit">Add Task</button>

            {% if form.errors %}
                <div class="error-box">
                    {{ form.errors }}
                </div>
            {% endif %}
        </form>

        <a href="/">Back</a>
    </div>
</body>
</html>
